services:
  # ── Backend Web Service ───────────────────────────────────────────────
  - type: web
    name: lifeos-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./lifeos.db
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: REKA_API_KEY
        sync: false
      - key: REKA_API_URL
        value: https://api.reka.ai/v1
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Frontend Web Service ──────────────────────────────────────────────
  - type: web
    name: lifeos-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build && cp -r .next/static .next/standalone/.next/static && mkdir -p .next/standalone/public && cp -r public/. .next/standalone/public/ 2>/dev/null || true
    startCommand: node .next/standalone/server.js
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://lifeos-backend-jus1.onrender.com
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
